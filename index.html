<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shadow Strike</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; background: linear-gradient(to bottom, #2c3e50, #34495e); }
  #controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
  }
  .btn {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.2);
    border: 2px solid #fff;
    border-radius: 50%;
    color: white;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
  <div>
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>
  <div>
    <div class="btn" id="jump">⤴</div>
    <div class="btn" id="attack">⚔</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
  x: 100,
  y: canvas.height - 150,
  w: 40,
  h: 60,
  vx: 0,
  vy: 0,
  speed: 5,
  jumpPower: -15,
  onGround: true,
  hp: 100,
  attacking: false,
  attackCooldown: 0,
  direction: 1
};

const gravity = 0.8;
let enemies = [];
let attacks = [];
let cameraX = 0;

function spawnEnemy() {
  enemies.push({
    x: cameraX + canvas.width + 50,
    y: canvas.height - 150,
    w: 40,
    h: 60,
    hp: 50,
    speed: 2,
    attacking: false
  });
}

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x - cameraX, player.y);
  ctx.scale(player.direction, 1);

  // Body - ganti ini jadi sprite nanti
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(0, 0, player.w, player.h);

  // Head
  ctx.fillStyle = '#ffdbac';
  ctx.fillRect(10, -20, 20, 20);

  // Sword when attacking
  if (player.attacking) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.w, 15, 30, 5);
  }

  ctx.restore();

  // HP bar
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(20, 20, 200, 15);
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(20, 20, 200 * (player.hp / 100), 15);
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x - cameraX, e.y);

  ctx.fillStyle = '#ff4444';
  ctx.fillRect(0, 0, e.w, e.h);

  // HP bar kecil
  ctx.fillStyle = '#000';
  ctx.fillRect(0, -10, 40, 5);
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(0, -10, 40 * (e.hp / 50), 5);

  ctx.restore();
}

function update() {
  // Physics
  player.vy += gravity;
  player.y += player.vy;
  player.x += player.vx;

  if (player.y > canvas.height - 150) {
    player.y = canvas.height - 150;
    player.vy = 0;
    player.onGround = true;
  }

  // Camera follow
  cameraX = player.x - 200;
  if (cameraX < 0) cameraX = 0;

  // Attack cooldown
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.attackCooldown === 0) player.attacking = false;

  // Enemy AI
  enemies.forEach(e => {
    if (e.x > player.x) e.x -= e.speed;
    if (e.x < player.x) e.x += e.speed;

    // Enemy attack
    if (Math.abs(e.x - player.x) < 50 && Math.random() < 0.02) {
      player.hp -= 10;
    }

    // Check attack hit
    attacks.forEach(a => {
      if (a.x < e.x + e.w && a.x + a.w > e.x && a.y < e.y + e.h && a.y + a.h > e.y) {
        e.hp -= 25;
        a.hit = true;
      }
    });
  });

  enemies = enemies.filter(e => e.hp > 0);
  attacks = attacks.filter(a => !a.hit);

  // Spawn enemy
  if (enemies.length < 3 && Math.random() < 0.02) spawnEnemy();

  // Game over
  if (player.hp <= 0) {
    alert('GAME OVER');
    location.reload();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(0, canvas.height - 90, canvas.width, 90);

  // Draw attacks
  ctx.fillStyle = '#ffff00';
  attacks.forEach(a => {
    ctx.fillRect(a.x - cameraX, a.y, a.w, a.h);
  });

  enemies.forEach(drawEnemy);
  drawPlayer();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Controls
document.getElementById('left').addEventListener('touchstart', () => {
  player.vx = -player.speed;
  player.direction = -1;
});
document.getElementById('left').addEventListener('touchend', () => {
  if (player.vx < 0) player.vx = 0;
});

document.getElementById('right').addEventListener('touchstart', () => {
  player.vx = player.speed;
  player.direction = 1;
});
document.getElementById('right').addEventListener('touchend', () => {
  if (player.vx > 0) player.vx = 0;
});

document.getElementById('jump').addEventListener('touchstart', () => {
  if (player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
  }
});

document.getElementById('attack').addEventListener('touchstart', () => {
  if (player.attackCooldown === 0) {
    player.attacking = true;
    player.attackCooldown = 20;
    attacks.push({
      x: player.x + (player.direction > 0? player.w : -30),
      y: player.y + 15,
      w: 30,
      h: 5,
      hit: false
    });
  }
});

// Keyboard for PC
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { player.vx = -player.speed; player.direction = -1; }
  if (e.key === 'ArrowRight') { player.vx = player.speed; player.direction = 1; }
  if (e.key === ' ') { 
    if (player.onGround) { player.vy = player.jumpPower; player.onGround = false; }
  }
  if (e.key === 'f') {
    if (player.attackCooldown === 0) {
      player.attacking = true;
      player.attackCooldown = 20;
      attacks.push({
        x: player.x + (player.direction > 0? player.w : -30),
        y: player.y + 15,
        w: 30,
        h: 5,
        hit: false
      });
    }
  }
});

window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' && player.vx < 0) player.vx = 0;
  if (e.key === 'ArrowRight' && player.vx > 0) player.vx = 0;
});

spawnEnemy();
gameLoop();
</script>
</body>
</html>
