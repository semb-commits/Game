<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Warzone Lite</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; background: #1a1a1a; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    text-shadow: 0 0 5px #00ff88;
  }
  #ammo {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 24px;
    font-weight: bold;
  }
  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: none;
    background: rgba(0,0,0,0.8);
    padding: 30px;
    border: 2px solid #ff4444;
  }
  button {
    margin-top: 20px;
    padding: 15px 30px;
    background: #ff4444;
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="hp">HP: 100</div>
  <div id="wave">WAVE: 1</div>
  <div id="kills">KILLS: 0</div>
</div>
<div id="ammo">30/30</div>
<div id="gameOver">
  <h1 style="color:#ff4444">MISSION FAILED</h1>
  <p id="finalScore">Kills: 0</p>
  <button onclick="location.reload()">RETRY</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  r: 18,
  hp: 100,
  speed: 4,
  angle: 0,
  ammo: 30,
  maxAmmo: 30,
  reloading: false,
  recoil: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let wave = 1;
let kills = 0;
let gameRunning = true;

function drawPlayer() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.translate(-player.recoil, 0);

  // Body
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(-12, -12, 24, 24);

  // Gun
  ctx.fillStyle = '#888';
  ctx.fillRect(0, -4, 20, 8);

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Body
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(-12, -12, 24, 24);

  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(4, -4, 4, 4);

  ctx.restore();
}

function shoot() {
  if (player.ammo <= 0 || player.reloading) {
    if (player.ammo <= 0 &&!player.reloading) reload();
    return;
  }

  player.ammo--;
  player.recoil = 8;

  bullets.push({
    x: player.x + Math.cos(player.angle) * 20,
    y: player.y + Math.sin(player.angle) * 20,
    vx: Math.cos(player.angle) * 12,
    vy: Math.sin(player.angle) * 12,
    r: 4
  });

  // Muzzle flash
  for(let i=0; i<8; i++) {
    particles.push({
      x: player.x + Math.cos(player.angle) * 20,
      y: player.y + Math.sin(player.angle) * 20,
      vx: Math.cos(player.angle + (Math.random()-0.5)) * 3,
      vy: Math.sin(player.angle + (Math.random()-0.5)) * 3,
      life: 15,
      color: '#ffff00'
    });
  }
}

function reload() {
  if (player.reloading) return;
  player.reloading = true;
  setTimeout(() => {
    player.ammo = player.maxAmmo;
    player.reloading = false;
  }, 1500);
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) { x = -30; y = Math.random() * canvas.height; }
  if (side === 1) { x = canvas.width + 30; y = Math.random() * canvas.height; }
  if (side === 2) { x = Math.random() * canvas.width; y = -30; }
  if (side === 3) { x = Math.random() * canvas.width; y = canvas.height + 30; }

  enemies.push({
    x, y,
    r: 15,
    hp: 30 + wave * 10,
    speed: 1.2 + wave * 0.15,
    shootCooldown: 0
  });
}

function update() {
  if (!gameRunning) return;

  // Player movement
  if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
  if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
  if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
  if (keys['d'] || keys['ArrowRight']) player.x += player.speed;
  if (keys['r']) reload();

  player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

  // Aim at mouse/touch
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if (mouse.down &&!player.reloading) shoot();

  // Recoil recovery
  if (player.recoil > 0) player.recoil -= 0.5;

  // Update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.x > -20 && b.x < canvas.width + 20 && b.y > -20 && b.y < canvas.height + 20;
  });

  // Update enemies
  enemies.forEach(e => {
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed;
    e.y += Math.sin(angle) * e.speed;

    // Enemy shooting
    e.shootCooldown--;
    if (e.shootCooldown <= 0 && Math.random() < 0.02) {
      e.shootCooldown = 60;
      bullets.push({
        x: e.x,
        y: e.y,
        vx: Math.cos(angle) * 8,
        vy: Math.sin(angle) * 8,
        r: 5,
        enemy: true
      });
    }

    // Collision with player
    if (Math.hypot(e.x - player.x, e.y - player.y) < e.r + player.r) {
      player.hp -= 15;
      e.hp = 0;
    }

    // Collision with bullets
    bullets.forEach(b => {
      if (!b.enemy && Math.hypot(e.x - b.x, e.y - b.y) < e.r + b.r) {
        e.hp -= 25;
        b.hit = true;
        for(let i=0; i<10; i++) {
          particles.push({
            x: e.x, y: e.y,
            vx: (Math.random()-0.5)*5,
            vy: (Math.random()-0.5)*5,
            life: 20,
            color: '#ff4444'
          });
        }
      }
    });
  });

  bullets = bullets.filter(b =>!b.hit);
  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      kills++;
      return false;
    }
    return true;
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0;
  });

  // Wave system
  if (enemies.length === 0) {
    wave++;
    for(let i=0; i<wave * 6; i++) {
      setTimeout(spawnEnemy, i * 300);
    }
  }

  if (player.hp <= 0) {
    gameRunning = false;
    document.getElementById('gameOver').style.display = 'block';
    document.getElementById('finalScore').textContent = `Kills: ${kills} | Wave: ${wave}`;
  }

  // UI Update
  document.getElementById('hp').textContent = `HP: ${Math.max(0, player.hp)}/100`;
  document.getElementById('wave').textContent = `WAVE: ${wave}`;
  document.getElementById('kills').textContent = `KILLS: ${kills}`;
  document.getElementById('ammo').textContent = player.reloading? 'RELOAD' : `${player.ammo}/${player.maxAmmo}`;
}

function draw() {
  // Background grid
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  for(let i=0; i<canvas.width; i+=50) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, canvas.height);
    ctx.stroke();
  }
  for(let i=0; i<canvas.height; i+=50) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(canvas.width, i);
    ctx.stroke();
  }

  // Draw particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 20;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Draw bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.enemy? '#ff4444' : '#ffff00';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  enemies.forEach(drawEnemy);
  drawPlayer();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Controls
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);

canvas.addEventListener('touchmove', e => {
  const touch = e.touches[0];
  mouse.x = touch.clientX;
  mouse.y = touch.clientY;
});

canvas.addEventListener('touchstart', () => mouse.down = true);
canvas.addEventListener('touchend', () => mouse.down = false);

// Start
for(let i=0; i<8; i++) spawnEnemy();
gameLoop();
</script>
</body>
   </html>
