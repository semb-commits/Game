<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>One Man Army</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; background: #111; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }
  #gameOver {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: none;
  }
  #gameOver button {
    margin-top: 20px;
    padding: 15px 30px;
    background: #00ff88;
    color: #0a0a0a;
    border: none;
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="ui">
  <div id="hp">HP: 100</div>
  <div id="wave">WAVE: 1</div>
  <div id="kills">KILLS: 0</div>
  <div id="level">LVL: 1</div>
</div>
<div id="gameOver">
  <h1 class="danger">YOU DIED</h1>
  <p id="finalScore">Kills: 0</p>
  <button onclick="location.reload()">RETRY</button>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  r: 15,
  hp: 100,
  maxHp: 100,
  speed: 3,
  attack: 10,
  attackSpeed: 500,
  lastAttack: 0
};

let bullets = [];
let enemies = [];
let particles = [];
let keys = {};
let wave = 1;
let kills = 0;
let level = 1;
let xp = 0;
let gameRunning = true;

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) { x = 0; y = Math.random() * canvas.height; }
  if (side === 1) { x = canvas.width; y = Math.random() * canvas.height; }
  if (side === 2) { x = Math.random() * canvas.width; y = 0; }
  if (side === 3) { x = Math.random() * canvas.width; y = canvas.height; }

  enemies.push({
    x, y,
    r: 12,
    hp: 20 + wave * 5,
    speed: 1.5 + wave * 0.1,
    color: '#ff4444'
  });
}

function shoot() {
  const now = Date.now();
  if (now - player.lastAttack < player.attackSpeed) return;

  let closest = null;
  let minDist = Infinity;

  enemies.forEach(e => {
    const dist = Math.hypot(e.x - player.x, e.y - player.y);
    if (dist < minDist) {
      minDist = dist;
      closest = e;
    }
  });

  if (closest) {
    const angle = Math.atan2(closest.y - player.y, closest.x - player.x);
    bullets.push({
      x: player.x,
      y: player.y,
      vx: Math.cos(angle) * 7,
      vy: Math.sin(angle) * 7,
      r: 4,
      dmg: player.attack
    });
    player.lastAttack = now;
  }
}

function update() {
  if (!gameRunning) return;

  // Move player
  if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
  if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
  if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
  if (keys['d'] || keys['ArrowRight']) player.x += player.speed;

  player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
  player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

  shoot();

  // Update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    return b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height;
  });

  // Update enemies
  enemies.forEach(e => {
    const angle = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(angle) * e.speed;
    e.y += Math.sin(angle) * e.speed;

    // Collision with player
    if (Math.hypot(e.x - player.x, e.y - player.y) < e.r + player.r) {
      player.hp -= 10;
      e.hp = 0;
    }

    // Collision with bullets
    bullets.forEach(b => {
      if (Math.hypot(e.x - b.x, e.y - b.y) < e.r + b.r) {
        e.hp -= b.dmg;
        b.hit = true;
        // Particle effect
        for(let i=0; i<5; i++) {
          particles.push({
            x: e.x, y: e.y,
            vx: (Math.random()-0.5)*4,
            vy: (Math.random()-0.5)*4,
            life: 20,
            color: e.color
          });
        }
      }
    });
  });

  bullets = bullets.filter(b =>!b.hit);
  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      kills++;
      xp += 10;
      if (xp >= level * 50) {
        level++;
        player.attack += 3;
        player.maxHp += 10;
        player.hp = player.maxHp;
      }
      return false;
    }
    return true;
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    return p.life > 0;
  });

  // Wave system
  if (enemies.length === 0) {
    wave++;
    const enemyCount = wave * 8;
    for(let i=0; i<enemyCount; i++) {
      setTimeout(spawnEnemy, i * 200);
    }
  }

  // Game over
  if (player.hp <= 0) {
    gameRunning = false;
    document.getElementById('gameOver').style.display = 'block';
    document.getElementById('finalScore').textContent = `Kills: ${kills} | Wave: ${wave}`;
  }

  // Update UI
  document.getElementById('hp').textContent = `HP: ${Math.max(0, player.hp)}/${player.maxHp}`;
  document.getElementById('wave').textContent = `WAVE: ${wave}`;
  document.getElementById('kills').textContent = `KILLS: ${kills}`;
  document.getElementById('level').textContent = `LVL: ${level}`;
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 20;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Draw bullets
  ctx.fillStyle = '#00ff88';
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw enemies
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw player
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();

  // Draw player HP bar
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(player.x - 20, player.y - 25, 40, 4);
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(player.x - 20, player.y - 25, 40 * (player.hp / player.maxHp), 4);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Controls
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Mobile touch controls
canvas.addEventListener('touchmove', e => {
  const touch = e.touches[0];
  player.x = touch.clientX;
  player.y = touch.clientY;
});

// Start game
for(let i=0; i<8; i++) spawnEnemy();
gameLoop();
</script>
</body>
  </html>
