<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Strike Lite</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
  body { margin: 0; background: #000; overflow: hidden; }
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<script>
const config = {
  type: Phaser.AUTO,
  width: 1280,
  height: 720,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 1000 }, debug: false }
  },
  scene: {
    preload: preload,
    create: create,
    update: update
  }
};

const game = new Phaser.Game(config);

// Variabel global
let player, cursors, attackKey, enemies, bullets, hpText, attackCooldown = 0;

function preload() {
  // Karena kita nggak punya sprite, pakai shape bawaan Phaser dulu
  // Nanti ganti URL ini jadi spritesheet lu
  this.load.image('bg', 'https://labs.phaser.io/assets/skies/space3.png');
  this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
}

function create() {
  // Background
  this.add.image(640, 360, 'bg').setScale(2);
  
  // Ground
  const platforms = this.physics.add.staticGroup();
  platforms.create(640, 700, 'ground').setScale(4).refreshBody();

  // Player
  player = this.physics.add.sprite(100, 600, null);
  player.setSize(40, 60);
  player.setOffset(0, 0);
  player.setCollideWorldBounds(true);
  
  // Bikin player keliatan pake rectangle
  player.setTint(0x00ff88);
  this.add.rectangle(player.x, player.y, 40, 60, 0x00ff88);

  // Enemy group
  enemies = this.physics.add.group();
  spawnEnemy(this);

  // Attack hitbox
  bullets = this.physics.add.group();

  // Collision
  this.physics.add.collider(player, platforms);
  this.physics.add.collider(enemies, platforms);
  
  // Attack hit enemy
  this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
  
  // Enemy touch player
  this.physics.add.overlap(player, enemies, hitPlayer, null, this);

  // Controls
  cursors = this.input.keyboard.createCursorKeys();
  attackKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.F);

  // UI
  hpText = this.add.text(20, 20, 'HP: 100', { 
    fontSize: '32px', 
    fill: '#00ff88',
    fontFamily: 'Courier New'
  });
  
  this.add.text(20, 60, 'Controls: Arrow Keys, F to Attack', { 
    fontSize: '18px', 
    fill: '#fff' 
  });

  // Spawn enemy tiap 3 detik
  this.time.addEvent({ delay: 3000, callback: () => spawnEnemy(this), loop: true });
}

function update() {
  // Movement
  if (cursors.left.isDown) {
    player.setVelocityX(-300);
    player.flipX = true;
  } else if (cursors.right.isDown) {
    player.setVelocityX(300);
    player.flipX = false;
  } else {
    player.setVelocityX(0);
  }

  // Jump
  if (cursors.up.isDown && player.body.touching.down) {
    player.setVelocityY(-500);
  }

  // Attack
  if (Phaser.Input.Keyboard.JustDown(attackKey) && attackCooldown <= 0) {
    attack(this);
    attackCooldown = 20;
  }
  
  if (attackCooldown > 0) attackCooldown--;

  // Update enemy AI
  enemies.children.iterate(enemy => {
    if (enemy && enemy.active) {
      // Jalan ke player
      if (enemy.x > player.x) enemy.setVelocityX(-100);
      else enemy.setVelocityX(100);
      
      // Destroy kalau keluar layar
      if (enemy.x < player.x - 1000 || enemy.x > player.x + 1000) {
        enemy.destroy();
      }
    }
  });

  // Update HP UI
  hpText.setText('HP: ' + player.getData('hp'));
}

function attack(scene) {
  const bullet = bullets.create(player.x + (player.flipX ? -40 : 40), player.y, null);
  bullet.setSize(30, 10);
  bullet.setVelocityX(player.flipX ? -800 : 800);
  bullet.lifespan = 500;
  
  // Visual attack
  const rect = scene.add.rectangle(bullet.x, bullet.y, 30, 10, 0xffff00);
  scene.time.delayedCall(100, () => rect.destroy());
  
  scene.time.delayedCall(500, () => bullet.destroy());
}

function hitEnemy(bullet, enemy) {
  bullet.destroy();
  enemy.setTint(0xff0000);
  
  // Damage
  let hp = enemy.getData('hp') - 25;
  enemy.setData('hp', hp);
  
  if (hp <= 0) {
    // Efek ledakan
    for(let i=0; i<10; i++) {
      this.add.circle(enemy.x, enemy.y, 3, 0xff4444);
    }
    enemy.destroy();
  } else {
    this.time.delayedCall(100, () => enemy.clearTint());
  }
}

function hitPlayer(player, enemy) {
  let hp = player.getData('hp') || 100;
  hp -= 10;
  player.setData('hp', hp);
  
  player.setTint(0xff0000);
  this.time.delayedCall(200, () => player.clearTint());
  
  enemy.destroy();
  
  if (hp <= 0) {
    alert('GAME OVER');
    location.reload();
  }
}

function spawnEnemy(scene) {
  const x = Phaser.Math.Between(player.x + 500, player.x + 800);
  const enemy = enemies.create(x, 600, null);
  enemy.setSize(40, 60);
  enemy.setTint(0xff4444);
  enemy.setData('hp', 50);
}
</script>
</body>
</html>
