<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shadow Strike</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0a0a0a; 
    overflow: hidden; 
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  canvas { 
    display: block; 
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  
  #ui {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #00ff88;
    font-size: 18px;
    text-shadow: 2px 2px 4px #000;
    z-index: 10;
    pointer-events: none;
  }
  
  #controls {
    position: absolute;
    bottom: 25px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 25px;
    pointer-events: none;
    z-index: 10;
  }
  
  .btn {
    width: 75px;
    height: 75px;
    background: rgba(0,255,136,0.25);
    border: 2px solid #00ff88;
    border-radius: 50%;
    color: #00ff88;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    user-select: none;
    backdrop-filter: blur(5px);
  }
  
  .btn:active {
    background: rgba(0,255,136,0.5);
    transform: scale(0.92);
  }
</style>
</head>
<body>
<div id="ui">
  <div id="hp">HP: 100</div>
  <div id="wave">WAVE: 1</div>
  <div id="kills">KILLS: 0</div>
</div>

<div id="controls">
  <div style="display:flex; gap:18px;">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>
  <div style="display:flex; gap:18px;">
    <div class="btn" id="jump">⤴</div>
    <div class="btn" id="attack">⚔</div>
  </div>
</div>

<script>
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: '#1a1a2e',
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 1300 }, debug: false }
  },
  scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let player, cursors, enemies, attacks, hp = 100, kills = 0, wave = 1, attacking = false;
let leftDown = false, rightDown = false;

function preload() {
  // Ground
  this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
}

function create() {
  const scene = this;
  
  // World size
  this.physics.world.setBounds(0, 0, 4000, this.scale.height);
  
  // Ground
  const ground = this.physics.add.staticGroup();
  ground.create(2000, this.scale.height - 40, 'ground').setScale(8, 2).refreshBody();
  
  // Player - pake rectangle dulu biar ga error
  player = this.physics.add.sprite(200, 500, null);
  player.setSize(40, 60);
  player.setCollideWorldBounds(true);
  player.setData('hp', 100);
  
  // Visual player
  player.sprite = this.add.rectangle(player.x, player.y, 40, 60, 0x00ff88);
  
  // Enemy group
  enemies = this.physics.add.group();
  attacks = this.physics.add.group();
  
  // Collisions
  this.physics.add.collider(player, ground);
  this.physics.add.collider(enemies, ground);
  this.physics.add.overlap(attacks, enemies, hitEnemy, null, this);
  this.physics.add.overlap(player, enemies, hitPlayer, null, this);
  
  // Camera follow
  this.cameras.main.startFollow(player);
  this.cameras.main.setBounds(0, 0, 4000, this.scale.height);
  
  // Spawn enemy awal
  spawnEnemy(this, 700);
  
  // Controls
  setupControls(this);
  cursors = this.input.keyboard.createCursorKeys();
  this.input.keyboard.on('keydown-F', () => attack(this));
  this.input.keyboard.on('keydown-SPACE', () => {
    if (player.body.touching.down) player.setVelocityY(-700);
  });
  
  // Auto spawn enemy
  this.time.addEvent({ 
    delay: 3500, 
    callback: () => {
      if (enemies.countActive() < 5) {
        spawnEnemy(this, player.x + 700);
      }
    }, 
    loop: true 
  });
}

function update() {
  // Movement
  if (cursors.left.isDown || leftDown) {
    player.setVelocityX(-350);
    player.sprite.setFillStyle(0x00cc66);
  } else if (cursors.right.isDown || rightDown) {
    player.setVelocityX(350);
    player.sprite.setFillStyle(0x00cc66);
  } else {
    player.setVelocityX(0);
    player.sprite.setFillStyle(0x00ff88);
  }
  
  // Sync visual sprite
  player.sprite.x = player.x;
  player.sprite.y = player.y;
  
  // Update enemies
  enemies.children.iterate(enemy => {
    if (enemy && enemy.active) {
      enemy.sprite.x = enemy.x;
      enemy.sprite.y = enemy.y;
      
      if (enemy.x > player.x) {
        enemy.setVelocityX(-130);
      } else {
        enemy.setVelocityX(130);
      }
      
      if (Math.abs(enemy.x - player.x) > 1200) {
        enemy.destroy();
        enemy.sprite.destroy();
      }
    }
  });
  
  // Update UI
  document.getElementById('hp').textContent = `HP: ${hp}`;
  document.getElementById('wave').textContent = `WAVE: ${wave}`;
  document.getElementById('kills').textContent = `KILLS: ${kills}`;
  
  // Game over
  if (hp <= 0) {
    alert(`GAME OVER\nKills: ${kills}\nWave: ${wave}`);
    location.reload();
  }
}

function attack(scene) {
  if (attacking) return;
  attacking = true;
  
  const direction = player.flipX ? -1 : 1;
  const attackBox = attacks.create(player.x + direction * 50, player.y, null);
  attackBox.setSize(60, 25);
  
  const slash = scene.add.rectangle(attackBox.x, attackBox.y, 60, 25, 0xffff00, 0.7);
  scene.time.delayedCall(150, () => slash.destroy());
  scene.time.delayedCall(200, () => {
    attackBox.destroy();
    attacking = false;
  });
}

function hitEnemy(attack, enemy) {
  attack.destroy();
  enemy.setTint(0xff0000);
  enemy.sprite.setFillStyle(0xff0000);
  
  let eHP = enemy.getData('hp') - 35;
  enemy.setData('hp', eHP);
  
  if (eHP <= 0) {
    kills++;
    enemy.destroy();
    enemy.sprite.destroy();
    
    if (kills % 5 === 0) {
      wave++;
      hp = Math.min(100, hp + 15);
    }
  } else {
    this.time.delayedCall(100, () => {
      enemy.clearTint();
      enemy.sprite.setFillStyle(0xff4444);
    });
  }
}

function hitPlayer(player, enemy) {
  hp -= 18;
  player.setTint(0xff0000);
  player.sprite.setFillStyle(0xff0000);
  this.time.delayedCall(200, () => {
    player.clearTint();
    player.sprite.setFillStyle(0x00ff88);
  });
  
  player.setVelocityX(enemy.x < player.x ? 250 : -250);
  player.setVelocityY(-200);
  
  enemy.destroy();
  enemy.sprite.destroy();
}

function spawnEnemy(scene, x) {
  const enemy = enemies.create(x, scene.scale.height - 100, null);
  enemy.setSize(40, 60);
  enemy.setData('hp', 60 + wave * 15);
  
  enemy.sprite = scene.add.rectangle(enemy.x, enemy.y, 40, 60, 0xff4444);
}

function setupControls(scene) {
  const leftBtn = document.getElementById('left');
  const rightBtn = document.getElementById('right');
  const jumpBtn = document.getElementById('jump');
  const attackBtn = document.getElementById('attack');
  
  leftBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    leftDown = true;
  });
  leftBtn.addEventListener('touchend', () => leftDown = false);
  
  rightBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    rightDown = true;
  });
  rightBtn.addEventListener('touchend', () => rightDown = false);
  
  jumpBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (player.body.touching.down) player.setVelocityY(-700);
  });
  
  attackBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    attack(scene);
  });
}

// Resize handler
window.addEventListener('resize', () => {
  game.scale.resize(window.innerWidth, window.innerHeight);
});
</script>
</body>
       </html>
